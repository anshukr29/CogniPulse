<!DOCTYPE html>
<html lang="en" id="root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CogniPulse - Profile</title>
    
    <style>
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient-move 15s ease infinite;
        }
        .dark .animate-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Gemini Breathing Orb */
        @keyframes gemini-breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; filter: blur(2px); }
            50% { transform: scale(1.4); opacity: 1; filter: blur(6px); }
        }
        
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); }
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="animate-bg flex h-screen w-screen p-4 gap-4 transition-colors duration-500">

    <aside class="glass w-64 rounded-[30px] p-6 flex flex-col shadow-xl transition-all duration-500">
        <h1 class="text-3xl font-black text-indigo-600 dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-white dark:to-indigo-400 mb-10 tracking-tight">CogniPulse</h1>
        
        <nav class="flex-1 space-y-2 text-sm font-bold">
            <a href="index.html" class="flex items-center gap-3 p-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-black/20 transition">
                <span class="text-xl">📊</span> Dashboard
            </a>
            <a href="chat.html" class="flex items-center gap-3 p-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-black/20 transition">
                <span class="text-xl">🧠</span> AI Chat
            </a>
            <a href="memory.html" class="flex items-center gap-3 p-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-black/20 transition">
                <span class="text-xl">📜</span> Memory Logs
            </a>
            <a href="profile.html" class="flex items-center gap-3 p-3 rounded-lg bg-indigo-600 dark:bg-indigo-500/20 dark:border-l-4 dark:border-indigo-400 text-white dark:text-indigo-300 shadow-lg transition">
                <span class="text-xl">👤</span> Profile
            </a>
        </nav>

        <button onclick="toggleTheme()" class="mt-auto p-3 bg-white/50 dark:bg-black/20 rounded-xl font-bold text-xs text-slate-700 dark:text-white border border-white/20 transition shadow-sm mb-3">
            <span id="theme-icon">🌙</span> Switch Theme
        </button>

        <button onclick="localStorage.clear(); window.location.replace('login.html')" class="text-red-500 font-bold p-3 text-sm hover:bg-red-500/10 rounded-xl transition">
            Logout
        </button>
    </aside>

    <main class="flex-1 glass rounded-[40px] flex flex-col items-center justify-center transition-all duration-500 shadow-2xl relative overflow-hidden">
        
        <div class="text-center flex flex-col items-center z-10 w-full max-w-lg">
            
            <div class="relative flex items-center justify-center mb-6">
                <div class="absolute inset-[-10px] rounded-full gemini-orb opacity-60"></div>
                <div id="p-icon" class="relative w-28 h-28 bg-indigo-600 dark:bg-slate-900 border-4 border-white/40 dark:border-white/10 rounded-full flex items-center justify-center text-5xl text-white font-black shadow-xl z-10">
                    </div>
            </div>

            <h2 id="profile-name" class="text-4xl font-black text-slate-800 dark:text-white uppercase tracking-tight drop-shadow-md">Loading...</h2>
            <p class="text-indigo-600 dark:text-indigo-400 font-bold text-xs tracking-widest mt-2 uppercase italic">Neural Specialist</p>

            <div class="mt-12 flex gap-6 w-full justify-center">
                <div class="p-6 bg-white/50 dark:bg-black/30 rounded-3xl border border-white/40 dark:border-white/10 shadow-inner w-36 backdrop-blur-sm hover:scale-105 transition-transform duration-300">
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-2">Interactions</p>
                    <p id="interaction-count" class="text-3xl font-black text-slate-800 dark:text-white">0</p>
                </div>
                <div class="p-6 bg-white/50 dark:bg-black/30 rounded-3xl border border-white/40 dark:border-white/10 shadow-inner w-36 backdrop-blur-sm hover:scale-105 transition-transform duration-300">
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-2">Memory</p>
                    <p id="memory-status" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 dark:from-indigo-400 dark:to-cyan-400">Active</p>
                </div>
            </div>

        </div>
    </main>
    
    <script>
        const UID = localStorage.getItem('uid');
        const UNAME = localStorage.getItem('uname') || 'User';

        if (!UID) window.location.href = 'login.html';

         document.getElementById('profile-name').innerText = UNAME;
        document.getElementById('p-icon').innerText = UNAME.charAt(0).toUpperCase();

         async function updateStats() {
            try {
                const res = await fetch(`http://localhost:8000/api/logs/${UID}`);
                const logs = await res.json();

                 document.getElementById('interaction-count').innerText = logs.length;

                const mStatus = document.getElementById('memory-status');
                if (logs.length > 50) mStatus.innerText = "Ultra";
                else if (logs.length > 10) mStatus.innerText = "High";
                else mStatus.innerText = "Active";

            } catch (err) {
                console.log("Error syncing stats:", err);
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        if (localStorage.getItem('theme') === 'dark') document.getElementById('theme-icon').innerText = '☀️';

      
        window.onload = updateStats;
    </script>
</body>
</html>
