<!DOCTYPE html>
<html lang="en" id="root">

<head>
    <meta charset="UTF-8">
    <title>CogniPulse - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
         if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="bg-slate-100 dark:bg-zinc-950 flex h-screen p-4 gap-4 transition-colors duration-500">

    <aside
        class="w-64 bg-white dark:bg-zinc-900 rounded-3xl p-6 flex flex-col border border-slate-200 dark:border-zinc-800 shadow-sm">
        <h1 class="text-2xl font-black text-indigo-600 mb-10 tracking-tighter">CogniPulse</h1>
        <nav class="flex-1 space-y-2 text-sm font-bold">
            <a href="index.html"
                class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition">📊
                Dashboard</a>
            <a href="chat.html"
                class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition">🧠
                AI Chat</a>
            <a href="memory.html"
                class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-zinc-800 transition">📜
                Memory Logs</a>
            <a href="clients.html" class="flex items-center gap-3 p-3 rounded-xl bg-indigo-600 text-white shadow-lg">👤
                Profile</a>
        </nav>

        <button onclick="toggleTheme()"
            class="mt-4 p-3 bg-slate-50 dark:bg-zinc-800 rounded-xl text-center font-bold text-xs dark:text-white border dark:border-zinc-700 transition">
            <span id="theme-icon">🌙</span> Switch Theme
        </button>

        <button onclick="localStorage.clear(); window.location.href='login.html'"
            class="mt-4 text-red-500 font-bold p-3 text-sm hover:bg-red-50 dark:hover:bg-red-900/10 rounded-xl transition">Logout</button>
    </aside>

    <main class="flex-1 flex flex-col gap-6 transition-colors duration-500">
        <div
            class="bg-white dark:bg-zinc-900 p-10 rounded-[40px] border border-slate-200 dark:border-zinc-800 shadow-sm">
            <div class="flex items-center gap-8">
                <div id="p-icon"
                    class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center text-4xl text-white shadow-xl shadow-indigo-500/20 font-black">
                </div>
                <div>
                    <h2 id="profile-name" class="text-3xl font-black text-slate-800 dark:text-white uppercase">User Name
                    </h2>
                    <p class="text-indigo-500 font-bold uppercase text-[10px] tracking-widest mt-1 italic">Active AI
                        Collaborator</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-10">
                <div class="p-6 bg-slate-50 dark:bg-zinc-800 rounded-3xl border border-slate-100 dark:border-zinc-700">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Interactions</p>
                    <p class="text-2xl font-black text-slate-800 dark:text-white mt-1">128</p>
                </div>
                <div class="p-6 bg-slate-50 dark:bg-zinc-800 rounded-3xl border border-slate-100 dark:border-zinc-700">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Memory Capacity</p>
                    <p class="text-2xl font-black text-slate-800 dark:text-white mt-1">High</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const UNAME = localStorage.getItem('uname') || 'Admin';
        const UID = localStorage.getItem('uid');

        document.getElementById('profile-name').innerText = UNAME;
        document.getElementById('p-icon').innerText = UNAME.charAt(0).toUpperCase();

        if (!UID) window.location.href = 'login.html';

         function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

         if (localStorage.getItem('theme') === 'dark') {
            document.getElementById('theme-icon').innerText = '☀️';
        }
    </script>
</body>

</html>
