<!DOCTYPE html>
<html lang="en" id="root">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CogniPulse - Dashboard</title>

    <style>
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient-move 15s ease infinite;
        }

        .dark .animate-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gemini Breathing Orb */
        @keyframes gemini-breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; filter: blur(2px); }
            50% { transform: scale(1.4); opacity: 1; filter: blur(6px); }
        }
 
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 10px; }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); }
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="animate-bg flex h-screen w-screen p-4 gap-4 transition-colors duration-500">

    <aside class="glass w-64 rounded-[30px] p-6 flex flex-col shadow-xl transition-all duration-500 flex-shrink-0">
        <h1 class="text-3xl font-black text-indigo-600 dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-white dark:to-indigo-400 mb-10 tracking-tight">
            CogniPulse
        </h1>

        <nav class="flex-1 space-y-2 text-sm font-bold">
            <a href="index.html" class="flex items-center gap-3 p-3 rounded-lg bg-indigo-600 dark:bg-indigo-500/20 dark:border-l-4 dark:border-indigo-400 text-white dark:text-indigo-300 shadow-lg transition">
                <span class="text-xl">📊</span> Dashboard
            </a>
            <a href="chat.html" class="flex items-center gap-3 p-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-black/20 transition">
                <span class="text-xl">🧠</span> AI Chat
            </a>
            <a href="memory.html" class="flex items-center gap-3 p-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-black/20 transition">
                <span class="text-xl">📜</span> Memory Logs
            </a>
            <a href="profile.html" class="flex items-center gap-3 p-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-black/20 transition">
                <span class="text-xl">👤</span> Profile
            </a>
        </nav>

        <button onclick="toggleTheme()" class="mt-auto p-3 bg-white/50 dark:bg-black/20 rounded-xl font-bold text-xs text-slate-700 dark:text-white border border-white/20 transition shadow-sm mb-3">
            <span id="theme-icon">🌙</span> Switch Theme
        </button>

        <button onclick="localStorage.clear(); window.location.replace('login.html')" class="text-red-500 font-bold p-3 text-sm hover:bg-red-500/10 rounded-xl transition">
            Logout
        </button>
    </aside>

    <main class="flex-1 glass rounded-[40px] flex flex-col p-10 transition-all duration-500 shadow-2xl relative overflow-y-auto">
        
        <div class="w-full flex flex-col items-center justify-center mt-10 mb-20 z-10">
            <div class="flex items-center gap-3 mb-6 bg-white/50 dark:bg-black/20 px-5 py-2 rounded-full border border-white/30 dark:border-white/10 shadow-sm">
                <div class="w-3 h-3 rounded-full gemini-orb"></div>
                <span class="text-slate-600 dark:text-slate-300 font-bold text-xs tracking-widest uppercase">Neural link active</span>
            </div>

            <h2 class="text-5xl font-black text-slate-800 dark:text-white mb-10 tracking-tight drop-shadow-md text-center">
                Namaste, <br />
                <span id="dash-name" class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 dark:from-white dark:to-indigo-400"></span>!
            </h2>

            <div class="relative group mt-4">
                <div class="absolute -inset-1 rounded-2xl gemini-orb opacity-40 group-hover:opacity-100 transition duration-500"></div>
                <a href="chat.html" class="relative bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-5 rounded-2xl font-black tracking-widest uppercase shadow-xl hover:scale-[1.02] transition-transform flex items-center justify-center gap-3 text-lg border border-white/10">
                    <span>LAUNCH COGNICHAT</span>
                    <span>🚀</span>
                </a>
            </div>
        </div>

        <div class="w-full max-w-4xl mx-auto pb-10">
            <h3 class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] mb-4 text-center">iNSIGHTS Integration: Neural Structure Engine</h3>
            
            <div class="bg-white/30 dark:bg-black/20 rounded-[30px] p-8 border border-white/20 dark:border-white/5 shadow-inner relative overflow-hidden">
                <div class="relative z-10">
                    
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center text-xl border border-indigo-500/30">🛠️</div>
                            <div>
                                <h4 class="text-xl font-bold text-slate-800 dark:text-white">AI To-Do Engine</h4>
                                <p class="text-slate-600 dark:text-slate-400 text-xs" id="engine-status">Converts chaos into structured execution</p>
                            </div>
                        </div>
                        
                         <div id="active-tasks-badge" class="hidden items-center gap-2 px-3 py-1 bg-emerald-500/20 text-emerald-700 dark:text-emerald-400 border border-emerald-500/30 rounded-full text-[10px] font-bold uppercase tracking-wider">
                            Active Plan
                        </div>
                    </div>

                    <div class="flex gap-4 mb-8">
                        <input type="text" id="goal-input" placeholder="Enter a broad goal (e.g., Master Node.js or Prep for SSC)..." 
                            class="flex-1 bg-white/50 dark:bg-black/30 border border-white/50 dark:border-zinc-700 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all text-slate-800 dark:text-white">
                        <button onclick="structureTask()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-transform hover:scale-105">
                            Structure It
                        </button>
                        <button onclick="clearRoadmap()" class="bg-red-500/20 text-red-600 dark:text-red-400 border border-red-500/30 hover:bg-red-500/30 px-4 rounded-2xl font-bold transition" title="Clear Plan">
                           ✕
                        </button>
                    </div>

                    <div id="roadmap-container" class="space-y-3"></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Auth check & Username
        if (!localStorage.getItem('uid')) window.location.href = 'login.html';
        const userName = localStorage.getItem('uname') || "OPERATOR";
        document.getElementById('dash-name').innerText = userName.toUpperCase();

        // Theme Toggle Logic
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.getElementById('theme-icon').innerText = '☀️';
        }

        // --- SMART AI TO-DO ENGINE LOGIC ---
        let currentTasks = [];

        window.addEventListener('DOMContentLoaded', () => {
            const savedTasks = localStorage.getItem('aiRoadmap');
            if(savedTasks) {
                currentTasks = JSON.parse(savedTasks);
                renderTasks();
            } else {
                showEmptyState();
            }
        });

        function showEmptyState() {
             document.getElementById('roadmap-container').innerHTML = `
                <p class="text-center text-slate-500 dark:text-slate-400 text-xs italic py-10 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl bg-white/20 dark:bg-black/10">
                    Enter a goal above to generate an AI-structured roadmap.
                </p>`;
             document.getElementById('active-tasks-badge').classList.add('hidden');
        }

        // The Smart Analyzer Function
        function generateSmartSteps(goalText) {
            const text = goalText.toLowerCase();
            let steps = [];
            
            if (text.includes("html") || text.includes("css") || text.includes("frontend")) {
                steps = [
                    `Understand basic tags, structure, and semantic web`,
                    `Master styling rules, Flexbox, and Grid layouts`,
                    `Build 2 responsive landing pages to practice ${goalText}`
                ];
            } else if (text.includes("js") || text.includes("javascript") || text.includes("react") || text.includes("mern")) {
                steps = [
                    `Clear core concepts: Variables, Loops, and Functions`,
                    `Master DOM manipulation and State Management`,
                    `Build an interactive web application using ${goalText}`
                ];
            } else if (text.includes("backend") || text.includes("node") || text.includes("api") || text.includes("python") || text.includes("database")) {
                steps = [
                    `Set up the server environment and basic routing`,
                    `Connect to a Database (SQL/NoSQL) and create CRUD operations`,
                    `Implement Authentication and secure your endpoints`
                ];
            } else if (text.includes("job") || text.includes("interview") || text.includes("resume") || text.includes("exam") || text.includes("ssc") || text.includes("jpsc")) {
                steps = [
                    `Gather syllabus and previous year question papers`,
                    `Practice core concepts and take timed mock tests`,
                    `Review weak areas and revise formulas/facts daily`
                ];
            } else {
                // Default Dynamic Steps
                steps = [
                    `Research the core fundamentals of ${goalText}`,
                    `Break down the goal into daily actionable 1-hour tasks`,
                    `Execute the main phase and build a prototype`,
                    `Review, fix errors, and finalize the result`
                ];
            }

            const colors = ['emerald', 'indigo', 'purple', 'pink', 'orange'];
            return steps.map((step, index) => {
                return {
                    id: Date.now() + index, 
                    text: step,
                    done: false,
                    color: colors[index % colors.length]
                };
            });
        }

        function structureTask() {
            const goal = document.getElementById('goal-input').value.trim();
            const container = document.getElementById('roadmap-container');
            if(!goal) return alert("Please enter a goal first!");

            // Loading Animation
            container.innerHTML = `
                <div class="animate-pulse space-y-3">
                    <div class="h-14 bg-white/50 dark:bg-zinc-800/80 rounded-2xl w-full"></div>
                    <div class="h-14 bg-white/50 dark:bg-zinc-800/80 rounded-2xl w-3/4"></div>
                    <div class="h-14 bg-white/50 dark:bg-zinc-800/80 rounded-2xl w-full"></div>
                </div>
            `;

            // Smart Execution Delay
            setTimeout(() => {
                currentTasks = generateSmartSteps(goal);
                localStorage.setItem('aiRoadmap', JSON.stringify(currentTasks));
                renderTasks();
                document.getElementById('goal-input').value = ""; 
            }, 1200);
        }

        function toggleTask(id) {
            const taskIndex = currentTasks.findIndex(t => t.id === id);
            if(taskIndex !== -1) {
                currentTasks[taskIndex].done = !currentTasks[taskIndex].done;
                localStorage.setItem('aiRoadmap', JSON.stringify(currentTasks));
                renderTasks();
            }
        }

        function clearRoadmap() {
            if(confirm("Are you sure you want to clear the current roadmap?")) {
                currentTasks = [];
                localStorage.removeItem('aiRoadmap');
                showEmptyState();
            }
        }

        function renderTasks() {
            const container = document.getElementById('roadmap-container');
            if(currentTasks.length === 0) { showEmptyState(); return; }

            document.getElementById('active-tasks-badge').classList.remove('hidden');
            
            container.innerHTML = currentTasks.map((task, index) => {
                const colorCode = task.color;
                
                const bgClass = task.done 
                    ? 'bg-slate-200/50 dark:bg-zinc-800/50 border-slate-300 dark:border-zinc-700 opacity-60' 
                    : `bg-white/80 dark:bg-black/40 border-${colorCode}-500/30 hover:border-${colorCode}-500/60 shadow-sm`;
                
                const textClass = task.done 
                    ? 'text-slate-500 dark:text-slate-400 line-through' 
                    : `text-slate-800 dark:text-white`;
                
                const numberCircle = task.done
                    ? `<div class="w-7 h-7 rounded-full bg-slate-300 dark:bg-slate-600 flex items-center justify-center text-[10px] text-slate-600 dark:text-white font-bold">✓</div>`
                    : `<div class="w-7 h-7 rounded-full bg-${colorCode}-500/10 border-2 border-${colorCode}-500 flex items-center justify-center text-xs text-${colorCode}-600 dark:text-${colorCode}-400 font-black">${index + 1}</div>`;

                return `
                <div onclick="toggleTask(${task.id})" class="p-4 ${bgClass} border rounded-2xl flex items-center gap-4 group transition cursor-pointer backdrop-blur-sm">
                    ${numberCircle}
                    <span class="text-sm font-bold ${textClass}">${task.text}</span>
                </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
