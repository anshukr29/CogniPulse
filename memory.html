<!DOCTYPE html>
<html lang="en" id="root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CogniPulse - Memory Logs</title>
    <script>
         
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        
        .log-card { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-zinc-950 flex h-screen p-4 gap-4 transition-colors duration-500">
    
    <aside class="w-64 bg-white dark:bg-zinc-900 rounded-3xl p-6 flex flex-col border border-slate-200 dark:border-zinc-800 shadow-sm transition-colors duration-500">
        <h1 class="text-2xl font-black text-indigo-600 dark:text-indigo-400 mb-10 tracking-tighter">CogniPulse</h1>
        <nav class="flex-1 space-y-2 text-sm font-bold text-slate-500">
            <a href="index.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 dark:hover:bg-zinc-800 transition">📊 Dashboard</a>
            <a href="chat.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 dark:hover:bg-zinc-800 transition">🧠 AI Chat</a>
            <a href="memory.html" class="flex items-center gap-3 p-3 rounded-xl bg-indigo-600 text-white shadow-lg">📜 Memory Logs</a>
            <a href="profile.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 dark:hover:bg-zinc-800 transition">👤 Profile</a>
        </nav>
        
        <button onclick="toggleTheme()" class="mt-auto p-3 bg-slate-50 dark:bg-zinc-800 rounded-xl font-bold text-xs dark:text-white border dark:border-zinc-700 transition">
            <span id="theme-icon">🌙</span> Switch Theme
        </button>
    </aside>

    <main class="flex-1 bg-white dark:bg-zinc-900 rounded-3xl border border-slate-200 dark:border-zinc-800 flex flex-col overflow-hidden shadow-sm transition-colors duration-500">
        <div class="p-6 border-b dark:border-zinc-800 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-black text-slate-800 dark:text-white">Neural Memory Logs</h2>
                <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest mt-1">Hindsight Storage Active</p>
            </div>
            <button id="sync-btn" onclick="fetchLogs()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2 active:scale-95 shadow-lg shadow-indigo-500/20">
                <span id="sync-text">Sync Memories</span>
            </button>
        </div>
        
        <div id="logs-container" class="p-6 overflow-y-auto space-y-4 flex-1 bg-slate-50/20 dark:bg-zinc-900/50">
            <div class="text-center text-slate-400 py-20 font-bold text-xs uppercase tracking-widest">
                Initializing Neural Link...
            </div>
        </div>
    </main>

    <script>
        const UID = localStorage.getItem('uid');
        if(!UID) window.location.href = 'login.html';

       
        async function fetchLogs() {
            const container = document.getElementById('logs-container');
            const syncBtn = document.getElementById('sync-btn');
            const syncText = document.getElementById('sync-text');
            
           
            syncBtn.disabled = true;
            syncText.innerText = "Syncing...";
            syncBtn.classList.add('animate-pulse', 'opacity-70');

            try {
                const response = await fetch(`http://localhost:8000/api/logs/${UID}`);
                const data = await response.json();

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20">
                            <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">No neural pulses found in memory.</p>
                        </div>`;
                } else {
                    container.innerHTML = "";  
                    data.forEach(log => {
                        container.innerHTML += `
                            <div id="log-${log.id}" class="log-card p-5 bg-white dark:bg-zinc-800 rounded-3xl border border-slate-100 dark:border-zinc-700 shadow-sm transition-all hover:border-indigo-300 dark:hover:border-indigo-900 group">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter">Neural Exchange</span>
                                    
                                    <button onclick="deleteMemory('${log.id}')" class="opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 transition-all text-[10px] font-black uppercase tracking-tighter">
                                        Erase Memory ✖
                                    </button>
                                </div>
                                <p class="text-xs font-bold text-slate-800 dark:text-white mb-2 italic">" ${log.user} "</p>
                                <div class="bg-slate-50 dark:bg-zinc-950/50 p-3 rounded-2xl border dark:border-zinc-800">
                                    <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">${log.ai}</p>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                container.innerHTML = `<div class="text-center py-20 text-red-500 font-bold text-xs uppercase">Link Failure: Server Offline</div>`;
            } finally {
                
                setTimeout(() => {
                    syncBtn.disabled = false;
                    syncText.innerText = "Sync Memories";
                    syncBtn.classList.remove('animate-pulse', 'opacity-70');
                }, 600);
            }
        }

        
        async function deleteMemory(logId) {
            if(!confirm("Hindsight se is memory ko hamesha ke liye delete karein?")) return;

            try {
                const res = await fetch(`http://localhost:8000/api/logs/${logId}`, { method: 'DELETE' });
                if(res.ok) {
                    const card = document.getElementById(`log-${logId}`);
                    card.classList.add('scale-95', 'opacity-0');
                    setTimeout(() => fetchLogs(), 300);  
                }
            } catch (err) {
                alert("Neural rewrite failed!");
            }
        }

       
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        if (localStorage.getItem('theme') === 'dark') document.getElementById('theme-icon').innerText = '☀️';
        window.onload = fetchLogs;
    </script>
</body>
</html>
